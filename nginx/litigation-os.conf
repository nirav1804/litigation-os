# ─── Litigation OS — Nginx Production Config ──────────────────────────────────
# Place at: /etc/nginx/sites-available/litigation-os
# Enable: ln -s /etc/nginx/sites-available/litigation-os /etc/nginx/sites-enabled/
# SSL:  certbot --nginx -d yourdomain.com -d api.yourdomain.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ─── Frontend ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$server_name$request_uri;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache Next.js static assets aggressively
    location /_next/static {
        proxy_pass http://localhost:3000/_next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─── Backend API ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;

    # Max upload size (match backend 50MB limit)
    client_max_body_size 55M;

    gzip on;
    gzip_types application/json;

    # General API rate limiting
    location /api/v1/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Allow time for AI responses
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth/register {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL
    location /graphql {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Health check (no rate limit)
    location /api/v1/health {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        access_log off;
    }
}

